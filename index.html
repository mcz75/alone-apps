<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>alone — vocabulary</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e0c;
      --card-front: #1a1915;
      --card-back: #f5f0e8;
      --ink: #f5f0e8;
      --ink-dim: #6b6760;
      --ink-back: #1a1915;
      --accent: #c8a96e;
      --accent-dim: #6b5a38;
      --border: #2a2925;
      --tag-en: #2a3a2a;
      --tag-en-text: #7ab87a;
      --tag-de: #2a2a3a;
      --tag-de-text: #7a7ab8;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      gap: 2rem;
    }

    header {
      width: 100%;
      max-width: 680px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    .logo span { font-style: italic; }

    .meta {
      font-size: 0.7rem;
      color: var(--ink-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* filters */
    .filters {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 680px;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* progress */
    .progress-bar {
      width: 100%;
      max-width: 680px;
      height: 2px;
      background: var(--border);
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 0.65rem;
      color: var(--ink-dim);
      text-align: right;
      margin-top: 0.4rem;
      letter-spacing: 0.06em;
    }

    /* card scene */
    .scene {
      width: 100%;
      max-width: 680px;
      perspective: 1200px;
      cursor: pointer;
      min-height: 320px;
    }

    .card {
      width: 100%;
      min-height: 320px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute;
      width: 100%;
      min-height: 320px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2.5rem;
      gap: 1rem;
    }

    .face--front {
      background: var(--card-front);
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .face--back {
      background: var(--card-back);
      color: var(--ink-back);
      transform: rotateY(180deg);
      justify-content: flex-start;
    }

    /* front face */
    .word-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }

    .word {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .pronunciation {
      font-size: 0.8rem;
      color: var(--ink-dim);
      font-style: italic;
    }

    .tag {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 2px;
    }

    .tag-en { background: var(--tag-en); color: var(--tag-en-text); }
    .tag-de { background: var(--tag-de); color: var(--tag-de-text); }

    .flip-hint {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--accent-dim);
      text-transform: uppercase;
      margin-top: auto;
    }

    /* back face */
    .back-word {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #1a1915;
      letter-spacing: -0.01em;
      border-bottom: 1px solid #d0c9b8;
      padding-bottom: 0.75rem;
    }

    .back-section-label {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8a8070;
      margin-top: 0.75rem;
    }

    .back-definition {
      font-size: 0.85rem;
      line-height: 1.7;
      color: #2a2520;
    }

    .back-examples {
      font-size: 0.78rem;
      line-height: 1.65;
      color: #4a4540;
    }

    .back-example { margin-bottom: 0.3rem; }
    .back-example::before { content: "— "; color: var(--accent-dim); }

    /* controls */
    .controls {
      display: flex;
      gap: 1rem;
      width: 100%;
      max-width: 680px;
      justify-content: center;
    }

    .btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      flex: 1;
      max-width: 180px;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.2; cursor: default; }
    .btn-accent { border-color: var(--accent-dim); color: var(--accent); }
    .btn-accent:hover { background: var(--accent); color: var(--bg); }

    /* loading / empty */
    .status {
      color: var(--ink-dim);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-align: center;
      padding: 4rem 0;
    }

    .dot { animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>alone</span> — vocabulary</div>
  <div class="meta" id="date-label"></div>
</header>

<div class="filters">
  <button class="filter-btn active" data-lang="ALL">All</button>
  <button class="filter-btn" data-lang="EN">English</button>
  <button class="filter-btn" data-lang="DE">Deutsch</button>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>
<div class="progress-label" id="progress-label">— / —</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="face face--front">
      <div class="status">Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
    </div>
    <div class="face face--back"></div>
  </div>
</div>

<div class="controls">
  <button class="btn" id="btn-prev" onclick="navigate(-1)" disabled>← prev</button>
  <button class="btn btn-accent" onclick="shuffleCards()">shuffle</button>
  <button class="btn" id="btn-next" onclick="navigate(1)">next →</button>
</div>

<script>
const TOKEN = null; // public repo read via raw — no token needed
const ALONE_REPO = "mcz75/alone";
let allCards = [];
let filtered = [];
let current = 0;
let isFlipped = false;
let activeLang = "ALL";

// Set date
document.getElementById("date-label").textContent = new Date().toISOString().slice(0,10);

async function fetchVocabList() {
  const url = `https://api.github.com/repos/${ALONE_REPO}/git/trees/main?recursive=1`;
  const res = await fetch(url);
  const data = await res.json();
  return data.tree
    .filter(f => f.path.startsWith("vocabulary/") && f.path.endsWith(".md"))
    .map(f => f.path);
}

function parseMeta(path) {
  // vocabulary/2026-06-03-EN-adroitly.md
  const filename = path.split("/")[1].replace(".md","");
  const parts = filename.split("-");
  const lang = parts[3]; // EN or DE
  const word = parts.slice(4).join("-");
  const date = parts.slice(0,3).join("-");
  return { lang, word, date, path };
}

function extractSection(text, heading) {
  const lines = text.split("\n");
  let inSection = false;
  let result = [];
  for (const line of lines) {
    if (line.startsWith("## ") || line.startsWith("# ")) {
      if (inSection) break;
      if (line.toLowerCase().includes(heading.toLowerCase())) { inSection = true; continue; }
    }
    if (inSection) result.push(line);
  }
  return result.join("\n").trim();
}

function extractExamples(text) {
  const section = extractSection(text, "Examples") || extractSection(text, "Beispiele");
  return section.split("\n")
    .filter(l => /^\d\./.test(l.trim()))
    .map(l => l.replace(/^\d\.\s*/, "").trim())
    .slice(0, 3);
}

function extractPronunciation(text) {
  const match = text.match(/^#{2,3}\s+Pronunciation[\s\S]*?\n([^\n]+)/m);
  if (match) return match[1].trim();
  const m2 = text.match(/\/[^/]+\//);
  return m2 ? m2[0] : "";
}

function extractDefinition(text) {
  const section = extractSection(text, "Explanation") || extractSection(text, "Erklärung") || extractSection(text, "Erkl");
  const lines = section.split("\n").filter(l => l.trim() && !l.startsWith("#"));
  return lines.slice(0,3).join(" ").replace(/\*\*/g,"").replace(/\*/g,"").trim().slice(0, 400);
}

async function fetchCard(meta) {
  const url = `https://raw.githubusercontent.com/${ALONE_REPO}/main/${meta.path}`;
  const res = await fetch(url);
  const text = await res.text();
  return {
    ...meta,
    pronunciation: extractPronunciation(text),
    definition: extractDefinition(text),
    examples: extractExamples(text)
  };
}

function renderFront(card) {
  return `
    <div class="word-label">word</div>
    <div class="word">${card.word}</div>
    ${card.pronunciation ? `<div class="pronunciation">${card.pronunciation}</div>` : ""}
    <span class="tag tag-${card.lang.toLowerCase()}">${card.lang}</span>
    <div class="flip-hint">click to reveal</div>
  `;
}

function renderBack(card) {
  const examples = card.examples.map(e => `<div class="back-example">${e}</div>`).join("");
  return `
    <div class="back-word">${card.word}</div>
    <div class="back-section-label">definition</div>
    <div class="back-definition">${card.definition}</div>
    ${card.examples.length ? `<div class="back-section-label">examples</div><div class="back-examples">${examples}</div>` : ""}
  `;
}

function showCard(index) {
  const card = filtered[index];
  if (!card) return;
  isFlipped = false;
  document.getElementById("card").classList.remove("flipped");
  document.querySelector(".face--front").innerHTML = renderFront(card);
  document.querySelector(".face--back").innerHTML = renderBack(card);
  document.getElementById("btn-prev").disabled = index === 0;
  document.getElementById("btn-next").disabled = index === filtered.length - 1;
  const pct = filtered.length > 1 ? (index / (filtered.length - 1)) * 100 : 100;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = `${index + 1} / ${filtered.length}`;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById("card").classList.toggle("flipped", isFlipped);
}

function navigate(dir) {
  if (isFlipped) { isFlipped = false; document.getElementById("card").classList.remove("flipped"); setTimeout(() => { current = Math.max(0, Math.min(filtered.length-1, current+dir)); showCard(current); }, 300); return; }
  current = Math.max(0, Math.min(filtered.length-1, current + dir));
  showCard(current);
}

function shuffleCards() {
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  current = 0;
  showCard(0);
}

function applyFilter(lang) {
  activeLang = lang;
  filtered = lang === "ALL" ? [...allCards] : allCards.filter(c => c.lang === lang);
  current = 0;
  if (filtered.length) showCard(0);
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyFilter(btn.dataset.lang);
  });
});

async function init() {
  try {
    const paths = await fetchVocabList();
    const metas = paths.map(parseMeta);
    // fetch all cards (sequential to avoid rate limiting)
    const cards = [];
    for (const meta of metas) {
      cards.push(await fetchCard(meta));
    }
    allCards = cards;
    filtered = [...allCards];
    if (filtered.length) showCard(0);
  } catch(e) {
    document.querySelector(".face--front").innerHTML = `<div class="status">Could not load vocabulary.<br/>${e.message}</div>`;
  }
}

init();
</script>
</body>
</html>
