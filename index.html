<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>alone apps</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f0e0c;color:#f5f0e8;font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
    .logo{font-family:'Playfair Display',serif;font-size:1.6rem;color:#c8a96e;margin-bottom:0.5rem;}
    .logo em{font-style:italic;}
    .tagline{font-size:0.65rem;color:#3d3a35;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:3rem;}
    .nav{display:flex;flex-direction:column;gap:1px;width:100%;max-width:300px;}
    .nav a{display:flex;justify-content:space-between;align-items:center;padding:1.1rem 1.25rem;background:#131210;border:1px solid #2a2925;text-decoration:none;color:#f5f0e8;font-size:0.82rem;transition:border-color 0.2s,color 0.2s;}
    .nav a:hover{border-color:#c8a96e;color:#c8a96e;}
    .nav a span{color:#3d3a35;font-size:0.7rem;}
    .date{margin-top:2.5rem;font-size:0.6rem;color:#2a2925;letter-spacing:0.1em;}
  </style>
</head>
<body>
  <div class="logo"><em>alone</em> apps</div>
  <div class="tagline">personal tools · Berlin</div>
  <nav class="nav">
    <a href="daily/">Daily <span>today →</span></a>
    <a href="reads/">Reads <span>archive →</span></a>
  </nav>
  <div class="date">Wednesday · 17 June 2026</div>
</body>
</html>
